<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FishNote — 회 도감 | 제철·맛·가격으로 보는 생선</title>
    <meta
      name="description"
      content="내가 먹는 회가 어떤 생선인지, 제철·맛·가격을 한눈에. 회 도감 FishNote."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FishNote — 회 도감 | 제철·맛·가격으로 보는 생선" />
    <meta
      property="og:description"
      content="내가 먹는 회가 어떤 생선인지, 제철·맛·가격을 한눈에. 회 도감 FishNote."
    />
    <meta property="og:url" content="https://fishnote.kr" />
    <meta property="og:image" content="/fish/gwangeo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FishNote — 회 도감 | 제철·맛·가격으로 보는 생선" />
    <meta
      name="twitter:description"
      content="내가 먹는 회가 어떤 생선인지, 제철·맛·가격을 한눈에. 회 도감 FishNote."
    />
    <meta name="twitter:image" content="/fish/gwangeo.jpg" />
    <meta name="theme-color" content="#0F6E84" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E161A" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://fishnote.kr" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // 다크모드 FOUC 방지: 렌더 전에 html.dark 클래스 결정 (저장값 → 시스템 설정 순)
      (function () {
        try {
          var stored = localStorage.getItem('fishnote-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
