spring.datasource.url=jdbc:h2:mem:fishnote;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=MONTH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.flyway.enabled=false
CLOUDINARY_URL=cloudinary://test-key:test-secret@test-cloud
JWT_SECRET=test-jwt-secret-value-with-at-least-32-bytes

# 테스트에서는 레이트 리미팅 비활성 (반복 요청 테스트가 429에 걸리지 않도록)
app.rate-limit.enabled=false
